# ========================
# Server Configuration
# ========================
server.port=8080

# ========================
# Supabase / PostgreSQL (Default Runtime)
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=extensions
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=UUID
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/mysql
spring.flyway.baseline-on-migrate=true
spring.flyway.default-schema=extensions
spring.flyway.schemas=extensions

# H2 console is disabled under the default PostgreSQL runtime
spring.h2.console.enabled=false

# ========================
# Logging
# ========================
logging.level.com.example.ticketreservation=DEBUG
logging.level.org.springframework.web=INFO

# ========================
# Email (SendGrid SMTP)
# Set environment variable SENDGRID_API_KEY to your SendGrid API key.
# Uses SMTP relay (username: apikey, password: SENDGRID_API_KEY).
# Example local export:
#   export SENDGRID_API_KEY=SG_...\n
# If you prefer a different provider, update these properties accordingly.
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=nasibguma07@gmail.com

