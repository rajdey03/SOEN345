# ========================
# Server Configuration
# ========================
server.port=8080

# ========================
# H2 Database (Dev/Test)
# ========================
spring.datasource.url=jdbc:h2:mem:ticketreservationdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable H2 console for development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================
# Logging
# ========================
logging.level.com.example.ticketreservation=DEBUG
logging.level.org.springframework.web=INFO

# ========================
# Email (SendGrid SMTP)
# Set environment variable SENDGRID_API_KEY to your SendGrid API key.
# Uses SMTP relay (username: apikey, password: SENDGRID_API_KEY).
# Example local export:
#   export SENDGRID_API_KEY=SG_...\n
# If you prefer a different provider, update these properties accordingly.
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=nasibguma07@gmail.com

# Notes:
# - Do NOT commit real API keys. Use environment variables or CI secrets.
# - For production, set a verified sender in SendGrid and replace 'noreply@yourdomain.com'.
