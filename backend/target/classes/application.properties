# ========================
# Server Configuration
# ========================
server.port=8080

# ========================
# MySQL Database (Default Runtime)
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/ticketreservationdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Toronto
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=DegioSD1806!

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/mysql

# H2 console is disabled under the default MySQL runtime
spring.h2.console.enabled=false

# ========================
# Logging
# ========================
logging.level.com.example.ticketreservation=DEBUG
logging.level.org.springframework.web=INFO

# ========================
# Email (SendGrid SMTP)
# Set environment variable SENDGRID_API_KEY to your SendGrid API key.
# Uses SMTP relay (username: apikey, password: SENDGRID_API_KEY).
# Example local export:
#   export SENDGRID_API_KEY=SG_...\n
# If you prefer a different provider, update these properties accordingly.
spring.mail.host=smtp.sendgrid.net
spring.mail.port=587
spring.mail.username=apikey
spring.mail.password=${SENDGRID_API_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=nasibguma07@gmail.com

# Notes:
# - Do NOT commit real API keys. Use environment variables or CI secrets.
# - For production, set a verified sender in SendGrid and replace 'noreply@yourdomain.com'.
